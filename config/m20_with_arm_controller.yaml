controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    leg_pose_controller:
      type: position_controllers/JointGroupPositionController
    
    wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

leg_pose_controller:
  ros__parameters:
    joints:
      - fl_hipx_joint
      - fl_hipy_joint
      - fl_knee_joint
      - fr_hipx_joint
      - fr_hipy_joint
      - fr_knee_joint
      - hl_hipx_joint
      - hl_hipy_joint
      - hl_knee_joint
      - hr_hipx_joint
      - hr_hipy_joint
      - hr_knee_joint

wheel_velocity_controller:
  ros__parameters:
    joints:
      - fl_wheel_joint
      - fr_wheel_joint
      - hl_wheel_joint
      - hr_wheel_joint

arm_controller:
  ros__parameters:
    joints:
      - arm_joint1
      - arm_joint2
      - arm_joint3
      - arm_joint4
      - arm_joint5
      - arm_joint6
      - arm_joint7
      - arm_joint8
    command_interfaces:
      - position
    
    state_interfaces:
      - position
      - velocity

    allow_partial_joints_goal: false
    